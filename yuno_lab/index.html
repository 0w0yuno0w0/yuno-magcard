<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yunoᒼᑋªⁿ開発室</title>
<style>
    :root { --bg: #F5F5F7; --text: #2C302E; --accent: #E0B0B0; }
    body {
        font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text);
        display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        margin: 0; min-height: 100vh;
    }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.3rem; margin: 0 0 6px; text-align: center; }
    .sub { font-size: 0.9rem; color: #8a8a90; margin-bottom: 34px; text-align: center; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 700px; }
    .card {
        background: white; padding: 28px 26px; border-radius: 16px; color: var(--text);
        box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        text-decoration: none; transition: transform .18s, box-shadow .18s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 14px 26px rgba(0,0,0,0.09); }
    .card-icon {
        width: 46px; height: 46px; border-radius: 12px; background: rgba(224,176,176,0.16);
        display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .card-icon svg { width: 24px; height: 24px; stroke: var(--accent); }
    .card h2 { margin: 0 0 10px; font-size: 1.15rem; color: var(--accent); }
    .card p { margin: 0; font-size: 0.88rem; color: #636366; line-height: 1.65; flex-grow: 1; }
    .card .go { margin-top: 18px; font-size: 0.8rem; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 6px; }
    .card .go svg { width: 13px; height: 13px; stroke: var(--accent); transition: transform .18s; }
    .card:hover .go svg { transform: translateX(3px); }

    .back-link {
        margin-top: 36px; font-size: 0.8rem; color: #9a9a9e; text-decoration: none;
        border: 1px solid #ddd; padding: 7px 16px; border-radius: 20px; transition: 0.2s;
    }
    .back-link:hover { background: #eee; color: #555; }
</style>
</head>
<body>
    <h1>Yunoᒼᑋªⁿ開発室</h1>
    <p class="sub">ゆのᒼᑋªが楽するためのツール置き場です。ご利用は計画的に</p>

    <div class="grid">
        <a href="../Heart-shaped/" class="card">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.2 2 4.5 5.6 4c2.1-.3 4 .8 6.4 3 2.4-2.2 4.3-3.3 6.4-3 3.6.5 5.2 4.2 3.6 7.7C19.5 16.4 12 21 12 21z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h2>Heart Frame</h2>
            <p>ハート型のフレーム</p>
            <span class="go">開く
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
        </a>

        <a href="../yncollage/" class="card">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="1.4" stroke-linejoin="round"/><rect x="13" y="3" width="8" height="8" rx="1.4" stroke-linejoin="round"/><rect x="3" y="13" width="8" height="8" rx="1.4" stroke-linejoin="round"/><rect x="13" y="13" width="8" height="8" rx="1.4" stroke-linejoin="round"/></svg>
            </div>
            <h2>Photo Collage Maker</h2>
            <p>2～4枚の写真でコラージュ</p>
            <span class="go">開く
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
        </a>
    </div>

    <a href="../" class="back-link">← Yunoᒼᑋªⁿ Tool Portal に戻る</a>
</script>

</body>
</html>
